<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PromptProtect</title>
    <link rel="stylesheet" href="sidepanel.css" />
  </head>
  <body>
    <main class="shell">
      <header class="hero">
        <p class="eyebrow">PromptProtect</p>
        <h1>Security Console</h1>
        <p class="lede">
          Keep accidental secrets and basic PII out of supported LLM chats.
        </p>
      </header>

      <section class="stats" id="stats"></section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Guardrails</h2>
        </div>
        <label class="toggle">
          <input id="enabled-toggle" type="checkbox" />
          <span>Enable PromptProtect blocking</span>
        </label>
        <label class="toggle">
          <input id="detect-secrets-toggle" type="checkbox" />
          <span>Detect secret-like tokens</span>
        </label>
        <label class="toggle">
          <input id="detect-pii-toggle" type="checkbox" />
          <span>Detect email and phone PII</span>
        </label>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Supported Sites</h2>
          <span class="caption">Tight allowlist by design</span>
        </div>
        <div id="site-list" class="stack"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Custom Rules</h2>
          <span class="caption">Local regex patterns</span>
        </div>

        <form id="custom-rule-form" class="rule-form">
          <label>
            <span>Label</span>
            <input id="rule-label" name="label" type="text" maxlength="48" placeholder="Internal token" required />
          </label>

          <label>
            <span>Regex Pattern</span>
            <textarea id="rule-pattern" name="pattern" rows="3" placeholder="tok_[A-Za-z0-9]{24,}" required></textarea>
          </label>

          <div class="inline-fields">
            <label>
              <span>Category</span>
              <select id="rule-category" name="category">
                <option value="secret">Secret</option>
                <option value="pii">PII</option>
              </select>
            </label>

            <label>
              <span>Flags</span>
              <input id="rule-flags" name="flags" type="text" value="g" maxlength="6" />
            </label>
          </div>

          <div class="form-actions">
            <button type="submit" class="button button-primary">Add Rule</button>
            <p id="form-status" class="status"></p>
          </div>
        </form>

        <div id="custom-pattern-list" class="stack"></div>
      </section>

      <section class="panel">
        <div class="panel-heading">
          <h2>Recent Findings</h2>
          <button id="clear-logs-button" class="button button-ghost" type="button">Clear</button>
        </div>
        <div id="log-list" class="stack"></div>
      </section>
    </main>

    <script src="sidepanel/index.js"></script>
  </body>
</html>
